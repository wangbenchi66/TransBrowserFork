# TransBrowser 配置文件
# 本文件包含所有可配置项，修改后重启程序生效
# 如果某个值格式错误，程序将使用默认值并提示

# ====================================
# 窗口外观设置
# ====================================

[Window]
# 不透明度 (1-100)
# 100 = 完全不透明, 1 = 几乎透明
# 默认值: 100
Opacity=100

# 窗口位置 X,Y (像素)
# 默认值: 100,100
Position=100,100

# 窗口大小 宽度,高度 (像素)
# 默认值: 800,600
Size=800,600

# 主题背景色 (颜色名称或十六进制 #RRGGBB)
# 可用颜色: White, Black, Gray, Red, Blue, Green 等
# 或使用十六进制: #FFFFFF (白色), #000000 (黑色)
# 默认值: White
ThemeColor=White

# 隐藏标题栏 (true/false)
# true = 无边框模式, false = 显示标题栏
# 默认值: false
NoTitle=false

# 窗口始终置顶 (true/false)
# true = 窗口总在最前面, false = 正常层级
# 默认值: false
TopMost=false

# 任务栏显示 (true/false)
# true = 在任务栏显示图标, false = 隐藏任务栏图标
# 默认值: true
ShowInTaskbar=true

# 标题栏悬停显示模式 (true/false)
# true = 鼠标移到顶部才显示标题栏, false = 标题栏始终显示
# 默认值: false
HoverHeaderMode=false

# ====================================
# 标签栏设置
# ====================================

[TabBar]
# 显示标签栏 (true/false)
# true = 显示多标签栏, false = 隐藏标签栏
# 默认值: true
ShowTabBar=true

# ====================================
# 浏览器功能
# ====================================

[Browser]
# 默认打开网址
# 留空则显示新标签页
# 默认值: (空)
DefaultUrl=

# 自定义 User-Agent
# 留空使用默认 Edge User-Agent
# 默认值: (空)
UserAgent=

# 自动隐藏 (true/false)
# true = 失去焦点时自动隐藏窗口, false = 不自动隐藏
# 默认值: false
AutoHide=false

# 无图模式 (true/false)
# true = 网页不加载图片/视频, false = 正常显示
# 默认值: false
NoImageMode=false

# 网页背景透明 (true/false)
# true = 强制网页背景透明, false = 显示原始背景
# 默认值: false
TransparentBackground=false

# 移动模式 (true/false)
# true = 模拟移动设备, false = 桌面模式
# 默认值: false
MobileMold=false

# 鼠标穿透模式 (true/false)
# true = 鼠标点击穿透窗口, false = 正常交互
# 默认值: false
ClickThroughMode=false

# ====================================
# 快捷键设置
# ====================================
# 格式: Modifiers+Key
# 可用修饰键: Ctrl, Alt, Shift, Win
# 可用按键: A-Z, 0-9, F1-F12, Up, Down, Left, Right, Space, Tab, Enter 等
# 示例: Ctrl+Alt+Q, Alt+F1, Shift+Space

[Hotkeys]
# 老板键 (显示/隐藏窗口)
# 默认值: Alt+Q
BossKey=Alt+Q

# 增加不透明度
# 默认值: Alt+Right
OpacityUp=Alt+Right

# 减少不透明度
# 默认值: Alt+Left
OpacityDown=Alt+Left

# 重置不透明度到100%
# 默认值: Alt+Up
OpacityReset=Alt+Up

# 切换鼠标穿透模式
# 默认值: Ctrl+Alt+T
ClickThrough=Ctrl+Alt+T

# 后退
# 默认值: Alt+Shift+Z
GoBack=Alt+Shift+Z

# 运行 JavaScript
# 默认值: Alt+Shift+C
RunJs=Alt+Shift+C

# ====================================
# 自定义网站
# ====================================
# 格式: 网站名称|网址
# 每行一个，显示在新标签页中

[CustomSites]
# 示例:
# GitHub|https://github.com
# 百度|https://www.baidu.com

# ====================================
# 浏览历史
# ====================================
# 自动保存最近50条浏览记录
# 格式: 标题|网址|访问时间
# 不建议手动编辑此节

[History]
# 程序自动管理，请勿手动编辑
